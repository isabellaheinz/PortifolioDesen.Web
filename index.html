<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Fonte de textos -->
    <meta charset="UTF-8">
    <title>Portifólio de Isabella</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- Fonte de textos -->

    <!-- Fonte de títulos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap" rel="stylesheet">
    <!-- Fonte de títulos -->

    <style>
        .fonteTexto {
            font-family: "Montserrat", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;
        }

        .fonteTitulo {
            font-family: "Bowlby One", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        body {
            background: #fcb8d6;
            background: radial-gradient(circle, rgba(252, 184, 214, 1) 0%, rgba(232, 128, 196, 1) 63%, rgba(148, 187, 233, 1) 100%);
            background-attachment: fixed;
            background-size: cover;
            margin: 0%;
            padding: 0%;
        }

        #menu {
            height: 70px;
            font-size: 30px;
            align-items: center;
            list-style: none;
            color: white;
            display: flex;
            justify-content: space-evenly;
            margin: 0;
            padding: 0;

        }

        #menu a {
            color: white;
            text-decoration: none;
        }

        #menu a:hover {
            font-size: xx-large;
            color: rgb(255, 157, 208);
            background-color: rgba(240, 248, 255, 0.66);
            padding: 3px 15px;
            border-radius: 10px;
        }


        h1 {
            text-align: center;
            color: rgb(255, 255, 255);
            background-color: #ff60b589;
            padding: 5px 15px;
            width: 30%;
            margin: 10px auto;
            border-radius: 10px;

        }

        h2 {
            text-align: center;
            font-weight: 1000;
            display: flex;
            align-items: center;
            text-align: center;
            color: #333;
        }

        h2::before,
        h2::after {
            content: "";
            flex: 1;
            border-bottom: 2px solid #333;
            margin: 0 10px;
        }
        
    </style>
</head>

<body>

    <ul id="menu" class="fonteTitulo">

        <li> <a href="#">Inicio</a></li>
        <li> <a href="#">Sobre Mim</a></li>
        <li> <a href="#">Projetos</a></li>

    </ul>

    <h1 class="fonteTitulo">Portfólio de Isabella Heinz</h1>
    <h2 class="fonteTexto"><strong>Apresentação da Disciplina</strong></h2>




</body>

</html>
